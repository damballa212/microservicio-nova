services:
  # ─────────────────────────────────────────────
  # Servicio 1: API Principal (FastAPI)
  # ─────────────────────────────────────────────
  nova-api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    expose:
      - "8000"
    env_file:
      - .env
    environment:
      - EXECUTION_ROLE=api
    volumes:
      - nova-data:/app/data
      - nova-logs:/app/logs

  # ─────────────────────────────────────────────
  # Servicio 2: Worker RAG (Procesamiento de documentos)
  # ─────────────────────────────────────────────
  nova-worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    command: python -m src.rag.worker
    env_file:
      - .env
    environment:
      - EXECUTION_ROLE=worker
    volumes:
      - nova-data:/app/data
      - nova-logs:/app/logs

  # ─────────────────────────────────────────────
  # Servicio 3: Worker Episodios Semánticos
  # ─────────────────────────────────────────────
  nova-episodes-worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    command: python -m src.memory.episodes_worker
    env_file:
      - .env
    environment:
      - EXECUTION_ROLE=worker
    volumes:
      - nova-data:/app/data
      - nova-logs:/app/logs

  # ─────────────────────────────────────────────
  # Servicio 4: Dashboard Neural (Next.js)
  # ─────────────────────────────────────────────
  nova-dashboard:
    build:
      context: ./nova-dashboard
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    restart: always
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
    depends_on:
      - nova-api

volumes:
  nova-data:
  nova-logs:
